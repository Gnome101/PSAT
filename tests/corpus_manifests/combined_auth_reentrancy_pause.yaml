contract_name: C
description: |
  Real production functions stack auth + reentrancy + pause. The
  predicate tree is AND of three leaves (caller_authority/pause/
  reentrancy). The capability evaluator intersects the leaves and
  appends side conditions, producing a finite_set with [pause,
  reentrancy] in cap.conditions.

  Pinning the manifest locks down stacked-modifier resolution: the
  harness picks the first matching leaf (caller_authority via
  onlyOwner) which proves the auth modifier wasn't dropped during
  AND-composition. Pause + reentrancy classification of the OTHER
  leaves is verified in test_corpus_real_patterns.py at the
  capability-evaluator boundary.

  ``pause()`` is gated by onlyOwner only — pinning it here also
  verifies that a function gated by a SHARED modifier (also used
  by ``execute()``) classifies independently per-function (the
  predicate builder doesn't accidentally inherit ``execute()``'s
  pause/reentrancy gates onto ``pause()``).

source: |
  pragma solidity ^0.8.19;
  contract C {
      address public ownerVar;
      bool public _paused;
      uint256 private _status;
      uint256 private constant _NOT_ENTERED = 1;
      uint256 private constant _ENTERED = 2;
      uint256 public x;
      modifier onlyOwner() {
          require(msg.sender == ownerVar);
          _;
      }
      modifier whenNotPaused() {
          require(!_paused);
          _;
      }
      modifier nonReentrant() {
          require(_status != _ENTERED);
          _status = _ENTERED;
          _;
          _status = _NOT_ENTERED;
      }
      function pause() external onlyOwner {
          _paused = true;
      }
      function execute() external onlyOwner whenNotPaused nonReentrant {
          x = 1;
      }
  }

expected_functions:
  "pause()":
    authority_role: caller_authority
    kind: equality
    operator: eq
    confidence: high
    references_msg_sender: true
  "execute()":
    authority_role: caller_authority
    kind: equality
    operator: eq
    confidence: high
    references_msg_sender: true
