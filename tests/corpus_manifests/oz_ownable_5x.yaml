contract_name: C
description: |
  Real OZ 5.x Ownable shape — distinct from oz_ownable.yaml's pre-5.x
  ``require(msg.sender == owner)`` form. The 5.x version stacks:

    - if-revert with a custom error (OwnableUnauthorizedAccount)
    - cross-fn helper (_checkOwner internal)
    - getter view function (owner() public view) instead of direct
      state-var read
    - _msgSender() helper (OZ Context base) wrapping msg.sender

  All four paths exercised by ``onlyOwner`` -> ``_checkOwner`` ->
  ``if (owner() != _msgSender()) revert OwnableUnauthorizedAccount(...)``.

  This is the pattern @openzeppelin/contracts ships in 5.0+ and is
  what protocols like EtherFi, Lido, and most modern DeFi adopt
  unless they're on the older AccessControl path. Locking down this
  manifest validates:

    1. RevertDetector classifies the if-revert with a custom error
       as kind=if_revert (not opaque)
    2. Polarity normalizer flips ``if (X != Y) revert`` to
       ``allowed-when X == Y``, producing operator=eq
    3. Cross-fn handling via _checkOwner produces a HIGH caller_-
       authority leaf (msg.sender vs state var via getter)
    4. owner()/getter wrapping is transparent — provenance walks
       through to the underlying _owner state var

source: |
  pragma solidity ^0.8.19;
  contract C {
      address private _owner;
      uint256 public x;
      error OwnableUnauthorizedAccount(address account);

      function _msgSender() internal view returns (address) {
          return msg.sender;
      }
      function owner() public view returns (address) {
          return _owner;
      }
      function _checkOwner() internal view {
          if (owner() != _msgSender()) {
              revert OwnableUnauthorizedAccount(_msgSender());
          }
      }
      modifier onlyOwner() {
          _checkOwner();
          _;
      }
      function setX(uint256 v) external onlyOwner {
          x = v;
      }
      function open() external {
          x = 0;
      }
  }

expected_functions:
  "setX(uint256)":
    authority_role: caller_authority
    kind: equality
    operator: eq
    confidence: high
    references_msg_sender: true

unguarded:
  - "open()"
  - "owner()"
