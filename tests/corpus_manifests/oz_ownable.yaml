contract_name: C
description: |
  OZ Ownable shape. ``onlyOwner`` modifier with require(msg.sender ==
  owner). Canonical pattern across most non-AC contracts (Compound v2
  governance Timelock, OZ < 5.0 ProxyAdmin, etc.).

source: |
  pragma solidity ^0.8.19;
  contract C {
      address public ownerVar;
      uint256 public x;
      modifier onlyOwner() {
          require(msg.sender == ownerVar);
          _;
      }
      function setX(uint256 v) external onlyOwner {
          x = v;
      }
      function bumpX() external onlyOwner {
          x = x + 1;
      }
      function open() external {
          x = 0;
      }
  }

expected_functions:
  "setX(uint256)":
    authority_role: caller_authority
    kind: equality
    operator: eq
    confidence: high
    references_msg_sender: true
  "bumpX()":
    authority_role: caller_authority
    kind: equality
    operator: eq
    confidence: high

unguarded:
  - "open()"
