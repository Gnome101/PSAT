contract_name: C
description: |
  OZ Pausable + admin pause writer. ``transfer`` is gated by
  ``whenNotPaused`` (pause leaf, HIGH); ``pause`` itself is gated by
  ``onlyOwner`` (caller_authority equality, HIGH).

source: |
  pragma solidity ^0.8.19;
  contract C {
      address public ownerVar;
      bool public _paused;
      uint256 public x;
      modifier whenNotPaused() {
          require(!_paused);
          _;
      }
      function pause() external {
          require(msg.sender == ownerVar);
          _paused = true;
      }
      function unpause() external {
          require(msg.sender == ownerVar);
          _paused = false;
      }
      function transfer() external whenNotPaused {
          x = x + 1;
      }
  }

expected_functions:
  "transfer()":
    authority_role: pause
    confidence: high
  "pause()":
    authority_role: caller_authority
    kind: equality
    operator: eq
    confidence: high
  "unpause()":
    authority_role: caller_authority
    kind: equality
    operator: eq
    confidence: high
