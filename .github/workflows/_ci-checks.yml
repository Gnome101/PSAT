name: CI checks

# Reusable suite — called by pr.yml (pull_request) and main.yml (push to main).
# Failures here block both PR previews and prod deploys via the caller's `needs:` chain.
#
# Path-based gating: on pull_request events, jobs skip when no relevant files
# changed (e.g. site-only PRs skip lint/typecheck/test). Push events to main
# bypass the gates and run everything — main is the source of truth and we
# want every job exercised regardless of what the push touched.
on:
  workflow_call:
    outputs:
      python:
        description: "Caller can use this to gate downstream jobs (e.g. live-tests)."
        value: ${{ jobs.changes.outputs.python }}
      frontend:
        description: "True when frontend files changed."
        value: ${{ jobs.changes.outputs.frontend }}
      ci-config:
        description: "True when CI / Docker / Fly config changed — implies run-everything."
        value: ${{ jobs.changes.outputs.ci-config }}

# Pinned here so a future caller can't widen scope by accident.
permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci-config: ${{ steps.filter.outputs.ci-config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.python-version'
              - 'alembic/**'
              - 'alembic.ini'
              - 'db/**'
              - 'tests/fixtures/**'
            frontend:
              # No negations: dorny/paths-filter ORs patterns, so `'!foo/**'`
              # would match every file outside foo/ and force frontend=true
              # on every PR.
              - 'site/**'
            ci-config:
              - '.github/workflows/**'
              - 'Dockerfile'
              - 'fly.toml'
              - 'start_*.sh'
              - 'docker-compose.yml'

  lint:
    needs: changes
    # Bypass on push events (main pushes run everything).
    if: github.event_name != 'pull_request' || needs.changes.outputs.python == 'true' || needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.python == 'true' || needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pyright

  frontend-test:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  test:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.python == 'true' || needs.changes.outputs.ci-config == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: psat
          POSTGRES_PASSWORD: psat
          POSTGRES_DB: psat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test
      TEST_ARTIFACT_STORAGE_ENDPOINT: http://localhost:9000
      TEST_ARTIFACT_STORAGE_BUCKET: psat-artifacts-test
      TEST_ARTIFACT_STORAGE_ACCESS_KEY: psat-minio
      TEST_ARTIFACT_STORAGE_SECRET_KEY: psat-minio-secret
      # Routes scope_extraction._call_llm to fixtures; without this, integration tests hit OpenRouter.
      PSAT_LLM_STUB_DIR: tests/fixtures/scope_extraction/llm_responses
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # diff-cover needs origin/main history
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: astral-sh/setup-uv@v5
      - name: Start minio
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=psat-minio \
            -e MINIO_ROOT_PASSWORD=psat-minio-secret \
            minio/minio:latest server /data
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "minio ready"
              exit 0
            fi
            sleep 1
          done
          echo "minio failed to become ready"
          docker logs minio
          exit 1
      - run: uv sync --dev
      - run: forge --version
      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium
      - name: Create test database
        run: PGPASSWORD=psat psql -h localhost -U psat -d psat -c "CREATE DATABASE psat_test OWNER psat;"

      # Migration parity: alembic upgrade head builds the schema from scratch,
      # then `alembic check` fails the build if Base.metadata has drifted from
      # the latest revision (i.e. someone changed a model without writing a
      # migration).
      - name: Alembic upgrade + drift check
        env:
          DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test
        run: |
          uv run alembic upgrade head
          uv run alembic check

      - name: Run tests with coverage
        run: uv run coverage run -m pytest -m "not live" -q

      - name: Coverage report
        run: |
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(uv run coverage report --format=total)
          echo "**Total coverage: ${TOTAL}%**" >> $GITHUB_STEP_SUMMARY
          uv run coverage report

      - name: Generate coverage XML for diff-cover
        if: github.event_name == 'pull_request'
        run: uv run coverage xml -o coverage.xml

      # Only gates lines this PR added/changed — refactors that drop total coverage
      # don't fail the build, but new uncovered code does.
      - name: Diff coverage check
        if: github.event_name == 'pull_request'
        run: |
          uv run diff-cover coverage.xml \
            --compare-branch=origin/main \
            --fail-under=70 \
            --html-report diff-cover.html \
            --markdown-report diff-cover.md
          cat diff-cover.md >> $GITHUB_STEP_SUMMARY

      - name: Upload diff-cover HTML report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: diff-cover-report
          path: diff-cover.html
          if-no-files-found: ignore

  # Single aggregate status for branch protection. Treats `success` and
  # `skipped` the same — a site-only PR where lint/typecheck/test are
  # legitimately skipped still merges. Only fails when an upstream job
  # actually failed or was cancelled.
  #
  # Set this as the sole required check on `main` in branch protection;
  # the per-job checks should be removed from the required list since
  # they'll appear as "Skipped" on site-only PRs and block the merge.
  ci-pass:
    needs: [changes, lint, typecheck, frontend-test, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate upstream results
        run: |
          # `changes` gates every other job — if it didn't succeed, the four
          # downstream jobs all skip on missing outputs and would otherwise
          # silently green-light a PR with zero checks executed.
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "::error::changes job did not succeed: ${{ needs.changes.result }}"
            exit 1
          fi
          fail=0
          for r in "${{ needs.lint.result }}" "${{ needs.typecheck.result }}" "${{ needs.frontend-test.result }}" "${{ needs.test.result }}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "::error::Upstream job result: $r"
              fail=1
            fi
          done
          exit $fail
