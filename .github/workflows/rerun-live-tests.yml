name: Rerun live tests

# Manual workflow — comment `/rerun-tests` on a PR to dispatch (see
# pr-comment-commands.yml). Reruns `pytest -m live` against the existing
# preview without rebuilding or redeploying. Useful when live tests flaked
# or when /reset-db / /fork-prod left the preview in a different state and
# you want to re-validate.
#
# Bypasses the path-filter gate that skips live tests on site-only PRs —
# if the user explicitly asked, run them.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number whose live tests should be rerun"
        required: true
        type: string
      head_sha:
        description: "PR head SHA — pins the audit fixture URL via raw.github"
        required: true
        type: string

# Shared with pr.yml / fork-prod-to-pr.yml / reset-pr-db.yml — don't run
# tests against a preview that's mid-deploy or mid-reset.
concurrency:
  group: preview-${{ inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  live-tests:
    runs-on: ubuntu-latest
    environment: staging
    env:
      PR_NUMBER: ${{ inputs.pr_number }}
      APP_NAME: psat-pr-${{ inputs.pr_number }}
      PREVIEW_URL: https://psat-pr-${{ inputs.pr_number }}.fly.dev
    steps:
      - uses: actions/checkout@v4
        with:
          # Pin to the PR head so test code matches the deployed code.
          ref: ${{ inputs.head_sha }}

      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev

      - name: Wait for preview /api/health
        run: |
          URL="$PREVIEW_URL/api/health"
          # 2 min ceiling: cold-start is 30-60s; past that the preview is unhealthy.
          for i in $(seq 1 24); do
            if curl -fsS --max-time 5 "$URL" >/dev/null; then
              echo "preview healthy after attempt $i"
              exit 0
            fi
            echo "attempt $i: $URL not healthy yet, sleeping 5s"
            sleep 5
          done
          echo "::error::Preview never healthy at $URL"
          curl -v --max-time 5 "$URL" || true
          exit 1

      - name: Run live suite
        env:
          PSAT_LIVE_URL: ${{ env.PREVIEW_URL }}
          PSAT_ADMIN_KEY: ${{ secrets.PSAT_ADMIN_KEY }}
          # Pin to PR head SHA via raw.github — stable in git history regardless of renames.
          PSAT_LIVE_AUDIT_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ inputs.head_sha }}/tests/fixtures/audits/sample_audit.pdf
        run: uv run --no-sync pytest -m live -q

      - name: Post sticky result (success)
        if: success()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          number: ${{ env.PR_NUMBER }}
          header: psat-live-tests
          message: |
            ### :white_check_mark: Live integration tests passed (manual rerun)

            - **Preview:** ${{ env.PREVIEW_URL }}
            - **Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Post sticky result (failure)
        if: failure()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          number: ${{ env.PR_NUMBER }}
          header: psat-live-tests
          message: |
            ### :x: Live integration tests failed (manual rerun)

            - **Preview:** ${{ env.PREVIEW_URL }}
            - **Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
