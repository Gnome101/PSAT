name: PR preview

# Triggered by CI completing on a PR. Gating on CI success keeps us from
# burning Fly + Neon resources on PRs whose lint/tests/typecheck didn't
# even pass — and from triggering a wasted live test run downstream.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# One deploy per PR at a time. Keyed on the triggering CI run id so two
# rapid pushes don't race two preview deploys for the same app — the
# latest CI run wins (the previous CI was cancelled by ci.yml's own
# cancel-in-progress, so its preview chain never started).
concurrency:
  group: preview-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  deploy:
    # Three gates, all required:
    # 1. CI must have succeeded — broken code shouldn't reach Fly.
    # 2. CI must have been triggered by a PR — main pushes go through
    #    prod-deploy.yml, not here.
    # 3. The PR's head must live in this repo — fork PRs don't get
    #    secrets and we don't want to deploy untrusted code to staging.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    environment: staging
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      NEON_STAGING_HOST: ${{ secrets.NEON_STAGING_HOST }}
      NEON_STAGING_POOLER_HOST: ${{ secrets.NEON_STAGING_POOLER_HOST }}
      NEON_STAGING_USER: ${{ secrets.NEON_STAGING_USER }}
      NEON_STAGING_PASSWORD: ${{ secrets.NEON_STAGING_PASSWORD }}
    steps:
      # Pinned to v4 (first-party GitHub action — tag is fine).
      # Checkout the SHA that CI ran against, not the workflow_run head
      # (default), so PR_NUMBER resolution and the deploy operate on the
      # exact same commit CI signed off on.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # workflow_run.pull_requests is populated for same-repo PRs; fall
          # back to a head-SHA lookup otherwise. Either fails → the CI run
          # doesn't belong to a resolvable PR and there's nothing to preview.
          PR_NUM=$(echo '${{ toJSON(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(gh pr list \
              -R "${{ github.repository }}" \
              --search "${{ github.event.workflow_run.head_sha }}" \
              --json number \
              --jq '.[0].number // empty')
          fi
          if [ -z "$PR_NUM" ]; then
            echo "::error::Could not resolve PR number for head SHA ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi
          echo "number=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Set Fly app name
        id: fly
        run: echo "app=psat-pr-${{ steps.pr.outputs.number }}" >> $GITHUB_OUTPUT

      # superfly/flyctl-actions has no release tags; pin to master SHA.
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Create Fly app if missing
        run: |
          flyctl apps create "${{ steps.fly.outputs.app }}" --org personal || true

      - name: Create per-PR Neon database
        env:
          PGPASSWORD: ${{ secrets.NEON_STAGING_PASSWORD }}
        run: |
          # CREATE DATABASE must target the direct compute endpoint. The
          # pooler endpoint runs pgbouncer in transaction mode, which
          # doesn't allow admin commands like CREATE DATABASE. The app
          # itself still uses the pooler (see DATABASE_URL below).
          psql "sslmode=require host=$NEON_STAGING_HOST user=$NEON_STAGING_USER dbname=neondb" \
            -c "CREATE DATABASE \"psat_pr_${{ steps.pr.outputs.number }}\";" || true

      - name: Stage Fly secrets
        run: |
          # App connects via the pooler endpoint so many preview envs + their
          # ~10 workers each don't blow through Neon's connection cap.
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          DB_URL="postgresql://${NEON_STAGING_USER}:${NEON_STAGING_PASSWORD}@${NEON_STAGING_POOLER_HOST}/psat_pr_${PR_NUMBER}?sslmode=require"
          flyctl secrets set --stage -a "${{ steps.fly.outputs.app }}" \
            DATABASE_URL="$DB_URL" \
            PSAT_ADMIN_KEY="${{ secrets.PSAT_ADMIN_KEY }}" \
            PSAT_SITE_ORIGIN="https://${{ steps.fly.outputs.app }}.fly.dev" \
            ETHERSCAN_API_KEY="${{ secrets.ETHERSCAN_API_KEY }}" \
            ETH_RPC="${{ secrets.ETH_RPC }}" \
            ENVIO_API_TOKEN="${{ secrets.ENVIO_API_TOKEN }}" \
            TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            OPEN_ROUTER_KEY="${{ secrets.OPEN_ROUTER_KEY }}" \
            GITHUB_TOKEN="${{ secrets.PROTOCOL_GITHUB_TOKEN }}" \
            ARTIFACT_STORAGE_ENDPOINT="${{ secrets.ARTIFACT_STORAGE_ENDPOINT }}" \
            ARTIFACT_STORAGE_BUCKET="${{ secrets.ARTIFACT_STORAGE_BUCKET }}" \
            ARTIFACT_STORAGE_ACCESS_KEY="${{ secrets.ARTIFACT_STORAGE_ACCESS_KEY }}" \
            ARTIFACT_STORAGE_SECRET_KEY="${{ secrets.ARTIFACT_STORAGE_SECRET_KEY }}" \
            ARTIFACT_STORAGE_PREFIX="pr-${PR_NUMBER}/"

      - name: Deploy preview
        run: flyctl deploy -a "${{ steps.fly.outputs.app }}" --remote-only

      # marocchino/sticky-pull-request-comment@v2.9.4 pinned to SHA.
      - name: Post/update sticky preview comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          number: ${{ steps.pr.outputs.number }}
          header: psat-preview
          message: |
            ### :rocket: PSAT preview deployed

            - **URL:** https://${{ steps.fly.outputs.app }}.fly.dev
            - **Health:** https://${{ steps.fly.outputs.app }}.fly.dev/api/health
            - **Fly app:** `${{ steps.fly.outputs.app }}`
            - **Neon DB:** `psat_pr_${{ steps.pr.outputs.number }}` (staging pooler)
            - **Artifact prefix:** `pr-${{ steps.pr.outputs.number }}/` (shared staging bucket)

            This environment is torn down automatically when the PR closes.
