name: Main deploy

# Sequential chain on push to main:
#   1. ci      (same suite as PRs)
#   2. deploy  (prod; gated by `production` environment approval)
on:
  push:
    branches: [main]

# Static group → multiple SHAs queue rather than race flyctl deploy.
concurrency:
  group: main-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/_ci-checks.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    # `production` env gates FLY_PROD_API_TOKEN + manual approval (Settings → Environments).
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_PROD_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Deploy to production
        # Runtime secrets are managed manually via `fly secrets set -a psat ...`; this workflow doesn't touch them.
        run: flyctl deploy -a psat --remote-only
