name: Production deploy

# CI-gated: red builds don't reach prod even if the `production` env approval is bypassed.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# Static group name → multiple SHAs queue rather than race flyctl deploy.
concurrency:
  group: prod-deploy
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    # Require CI success, a push event (PRs go to pr-preview), and a push to main.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    # `production` env gates FLY_PROD_API_TOKEN + manual approval (Settings → Environments).
    environment: production
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_PROD_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Deploy to production
        # Runtime secrets are set manually via `fly secrets set -a psat ...`; this workflow doesn't touch them.
        run: flyctl deploy -a psat --remote-only
