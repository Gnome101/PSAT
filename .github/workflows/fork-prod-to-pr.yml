name: Fork prod DB to PR preview

# Manual workflow — run when you want a PR preview to render with prod-shape
# data. Creates a Neon CoW branch from prod, points the preview's DATABASE_URL
# at the branch's compute endpoint, and scales background workers to 0 so they
# don't run real jobs (and burn API credits) against the cloned data.
#
# Web stays up. The branch is destroyed automatically when the PR closes (see
# pr-cleanup.yml). Re-run this workflow to refresh the snapshot from prod.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number whose preview should fork prod data"
        required: true
        type: string

# Shared with pr.yml so fork and deploy serialize on the same preview.
# cancel-in-progress: false → fork queues behind any in-progress deploy
# rather than stomping its secrets/restarts. A subsequent push will cancel
# this fork (pr.yml uses cancel-in-progress: true); rerun /fork-prod to
# restore.
concurrency:
  group: preview-${{ inputs.pr_number }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  fork:
    runs-on: ubuntu-latest
    environment: staging
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      # Hardcoded — Neon project IDs aren't sensitive and rarely change.
      PROD_NEON_PROJECT_ID: morning-silence-94271256
      PR_NUMBER: ${{ inputs.pr_number }}
      APP_NAME: psat-pr-${{ inputs.pr_number }}
    steps:
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Verify preview app exists
        # Belt-and-suspenders: refuse to ever target the prod app, and bail if
        # the preview app doesn't exist (mistyped PR number).
        run: |
          if [[ "$APP_NAME" == "psat" ]]; then
            echo "::error::Refusing to fork onto prod app"
            exit 1
          fi
          flyctl status -a "$APP_NAME" > /dev/null

      - name: Stop background process groups
        # workers/monitor/browser would otherwise pick up "in-flight" jobs from
        # the cloned data and run them — hitting Etherscan/RPC/OpenRouter/Tavily
        # for real. Web stays up so the preview URL keeps working.
        run: |
          for proc in workers monitor browser; do
            flyctl machines list -a "$APP_NAME" --json \
              | jq -r ".[] | select(.config.metadata.fly_process_group == \"$proc\" and .state != \"stopped\") | .id" \
              | xargs -r -I{} flyctl machines stop {} -a "$APP_NAME" || true
          done

      - name: Create Neon branch from prod
        id: branch
        # Branch name encodes the PR + a timestamp so re-forks don't collide
        # and pr-cleanup can match every fork-branch for a given PR with one
        # prefix glob.
        run: |
          PROD_BRANCH=$(curl -sf -H "Authorization: Bearer $NEON_API_KEY" \
            "https://console.neon.tech/api/v2/projects/$PROD_NEON_PROJECT_ID/branches" \
            | jq -r '.branches[] | select(.primary == true) | .id')

          if [[ -z "$PROD_BRANCH" || "$PROD_BRANCH" == "null" ]]; then
            echo "::error::Could not find primary branch on prod project"
            exit 1
          fi

          BRANCH_NAME="pr-${PR_NUMBER}-fork-$(date +%s)"
          BODY=$(jq -nc \
            --arg name "$BRANCH_NAME" \
            --arg parent "$PROD_BRANCH" \
            '{branch: {name: $name, parent_id: $parent}, endpoints: [{type: "read_write"}]}')

          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            "https://console.neon.tech/api/v2/projects/$PROD_NEON_PROJECT_ID/branches" \
            -d "$BODY")

          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
          ENDPOINT_HOST=$(echo "$RESPONSE" | jq -r '.endpoints[0].host')

          if [[ -z "$BRANCH_ID" || "$BRANCH_ID" == "null" || -z "$ENDPOINT_HOST" || "$ENDPOINT_HOST" == "null" ]]; then
            echo "::error::Branch create returned unexpected shape: $RESPONSE"
            exit 1
          fi

          echo "branch_id=$BRANCH_ID" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "endpoint_host=$ENDPOINT_HOST" >> $GITHUB_OUTPUT

      - name: Stage forked DATABASE_URL on preview
        # --stage so the auto-restart doesn't un-stop the workers/monitor/browser
        # we just turned off. We restart only the web group below.
        run: |
          DB_URL="postgresql://staging_admin:${{ secrets.NEON_STAGING_PASSWORD }}@${{ steps.branch.outputs.endpoint_host }}/neondb?sslmode=require"
          flyctl secrets set --stage -a "$APP_NAME" DATABASE_URL="$DB_URL"

      - name: Restart preview web machines
        # Picks up the staged DATABASE_URL.
        run: |
          flyctl machines list -a "$APP_NAME" --json \
            | jq -r '.[] | select(.config.metadata.fly_process_group == "web") | .id' \
            | xargs -r -I{} flyctl machines restart {} -a "$APP_NAME"

      - name: Wait for preview /api/health
        # Same 2-min ceiling pattern as pr.yml live-tests.
        run: |
          URL="https://$APP_NAME.fly.dev/api/health"
          for i in $(seq 1 24); do
            if curl -fsS --max-time 5 "$URL" >/dev/null; then
              echo "preview healthy after attempt $i"
              exit 0
            fi
            echo "attempt $i: $URL not healthy yet, sleeping 5s"
            sleep 5
          done
          echo "::error::Preview never healthy at $URL after fork"
          curl -v --max-time 5 "$URL" || true
          exit 1

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          number: ${{ env.PR_NUMBER }}
          header: psat-fork
          message: |
            ### :test_tube: Forked from prod

            - **URL:** https://${{ env.APP_NAME }}.fly.dev
            - **Neon branch:** `${{ steps.branch.outputs.branch_name }}` (auto-deleted when the PR closes)
            - **Workers:** scaled to 0 against the forked data
            - :warning: **Any push to this PR will undo the fork** (the deploy resets `DATABASE_URL` to the per-PR staging DB and restarts workers). Comment `/fork-prod` again to restore.
            - **Refresh:** comment `/fork-prod` again to pull a newer prod snapshot
