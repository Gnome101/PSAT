name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Latest commit wins; cancelled runs don't trigger the preview/prod chain (both gated on success).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: psat
          POSTGRES_PASSWORD: psat
          POSTGRES_DB: psat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test
      TEST_ARTIFACT_STORAGE_ENDPOINT: http://localhost:9000
      TEST_ARTIFACT_STORAGE_BUCKET: psat-artifacts-test
      TEST_ARTIFACT_STORAGE_ACCESS_KEY: psat-minio
      TEST_ARTIFACT_STORAGE_SECRET_KEY: psat-minio-secret
      # Routes scope_extraction._call_llm to fixtures; without this, integration tests hit OpenRouter.
      PSAT_LLM_STUB_DIR: tests/fixtures/scope_extraction/llm_responses
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: astral-sh/setup-uv@v5
      - name: Start minio
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=psat-minio \
            -e MINIO_ROOT_PASSWORD=psat-minio-secret \
            minio/minio:latest server /data
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "minio ready"
              exit 0
            fi
            sleep 1
          done
          echo "minio failed to become ready"
          docker logs minio
          exit 1
      - run: uv sync --dev
      - run: forge --version
      - name: Create test database
        run: PGPASSWORD=psat psql -h localhost -U psat -d psat -c "CREATE DATABASE psat_test OWNER psat;"
      - run: uv run pytest -m "not live" -q

  coverage:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: psat
          POSTGRES_PASSWORD: psat
          POSTGRES_DB: psat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test
      TEST_ARTIFACT_STORAGE_ENDPOINT: http://localhost:9000
      TEST_ARTIFACT_STORAGE_BUCKET: psat-artifacts-test
      TEST_ARTIFACT_STORAGE_ACCESS_KEY: psat-minio
      TEST_ARTIFACT_STORAGE_SECRET_KEY: psat-minio-secret
      PSAT_LLM_STUB_DIR: tests/fixtures/scope_extraction/llm_responses
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: astral-sh/setup-uv@v5
      - name: Start minio
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=psat-minio \
            -e MINIO_ROOT_PASSWORD=psat-minio-secret \
            minio/minio:latest server /data
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "minio ready"
              exit 0
            fi
            sleep 1
          done
          echo "minio failed to become ready"
          docker logs minio
          exit 1
      - name: Create test databases
        run: |
          PGPASSWORD=psat psql -h localhost -U psat -d psat -c "CREATE DATABASE psat_test OWNER psat;"
          PGPASSWORD=psat psql -h localhost -U psat -d psat -c "CREATE DATABASE psat_test_baseline OWNER psat;"

      - name: Baseline coverage (main)
        if: github.event_name == 'pull_request'
        env:
          TEST_DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test_baseline
        run: |
          git checkout origin/main
          uv sync --dev
          # Baseline only needs the coverage number — tolerate pre-existing test failures on main.
          uv run --with coverage coverage run -m pytest -m "not live" -q || true
          MAIN_COV=$(uv run --with coverage coverage report --format=total)
          echo "MAIN_COV=$MAIN_COV" >> $GITHUB_ENV
          echo "Main coverage: ${MAIN_COV}%"
          git checkout -

      - run: uv sync --dev
      - run: uv run --with coverage coverage run -m pytest -m "not live" -q

      - name: Coverage report
        run: |
          uv run --with coverage coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(uv run --with coverage coverage report --format=total)
          echo "**Total coverage: ${TOTAL}%** (minimum: 70%)" >> $GITHUB_STEP_SUMMARY
          echo "Total coverage: ${TOTAL}%"
          uv run --with coverage coverage report

      - name: Coverage regression check
        if: github.event_name == 'pull_request'
        run: |
          PR_COV=$(uv run --with coverage coverage report --format=total)
          echo "main: ${MAIN_COV}% → PR: ${PR_COV}%"
          echo "**Coverage: ${MAIN_COV}% (main) → ${PR_COV}% (PR)**" >> $GITHUB_STEP_SUMMARY
          if [ "$PR_COV" -lt "$MAIN_COV" ]; then
            echo "::error::Coverage regression: ${MAIN_COV}% → ${PR_COV}%"
            exit 1
          fi
