name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Latest commit wins; cancelled runs don't trigger the preview/prod chain (both gated on success).
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: psat
          POSTGRES_PASSWORD: psat
          POSTGRES_DB: psat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test
      TEST_ARTIFACT_STORAGE_ENDPOINT: http://localhost:9000
      TEST_ARTIFACT_STORAGE_BUCKET: psat-artifacts-test
      TEST_ARTIFACT_STORAGE_ACCESS_KEY: psat-minio
      TEST_ARTIFACT_STORAGE_SECRET_KEY: psat-minio-secret
      # Routes scope_extraction._call_llm to fixtures; without this, integration tests hit OpenRouter.
      PSAT_LLM_STUB_DIR: tests/fixtures/scope_extraction/llm_responses
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: astral-sh/setup-uv@v5
      - name: Start minio
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=psat-minio \
            -e MINIO_ROOT_PASSWORD=psat-minio-secret \
            minio/minio:latest server /data
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "minio ready"
              exit 0
            fi
            sleep 1
          done
          echo "minio failed to become ready"
          docker logs minio
          exit 1
      - run: uv sync --dev
      - run: forge --version
      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium
      - name: Install hevm and z3
        run: |
          sudo apt-get update
          sudo apt-get install -y z3
          curl -L -o /tmp/hevm https://github.com/ethereum/hevm/releases/latest/download/hevm-x86_64-linux
          chmod +x /tmp/hevm
          sudo mv /tmp/hevm /usr/local/bin/hevm
          hevm version
          z3 --version
      - name: Create test database
        run: PGPASSWORD=psat psql -h localhost -U psat -d psat -c "CREATE DATABASE psat_test OWNER psat;"
      - run: uv run pytest -m "not live" -q

  coverage:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: psat
          POSTGRES_PASSWORD: psat
          POSTGRES_DB: psat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test
      TEST_ARTIFACT_STORAGE_ENDPOINT: http://localhost:9000
      TEST_ARTIFACT_STORAGE_BUCKET: psat-artifacts-test
      TEST_ARTIFACT_STORAGE_ACCESS_KEY: psat-minio
      TEST_ARTIFACT_STORAGE_SECRET_KEY: psat-minio-secret
      PSAT_LLM_STUB_DIR: tests/fixtures/scope_extraction/llm_responses
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: astral-sh/setup-uv@v5
      - name: Start minio
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=psat-minio \
            -e MINIO_ROOT_PASSWORD=psat-minio-secret \
            minio/minio:latest server /data
          for i in {1..30}; do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "minio ready"
              exit 0
            fi
            sleep 1
          done
          echo "minio failed to become ready"
          docker logs minio
          exit 1
      - name: Create test database
        run: PGPASSWORD=psat psql -h localhost -U psat -d psat -c "CREATE DATABASE psat_test OWNER psat;"

      - run: uv sync --dev
      - name: Install Playwright browser
        run: uv run playwright install --with-deps chromium
      - name: Install hevm and z3
        run: |
          sudo apt-get update
          sudo apt-get install -y z3
          curl -L -o /tmp/hevm https://github.com/ethereum/hevm/releases/latest/download/hevm-x86_64-linux
          chmod +x /tmp/hevm
          sudo mv /tmp/hevm /usr/local/bin/hevm
          hevm version
          z3 --version
      - run: uv run coverage run -m pytest -m "not live" -q

      - name: Coverage report
        run: |
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(uv run coverage report --format=total)
          echo "**Total coverage: ${TOTAL}%** (minimum: 70%)" >> $GITHUB_STEP_SUMMARY
          echo "Total coverage: ${TOTAL}%"
          uv run coverage report
          uv run coverage xml -o coverage.xml

      # Only gates lines this PR added/changed — refactors that drop total coverage
      # don't fail the build, but new uncovered code does.
      - name: Diff coverage check
        if: github.event_name == 'pull_request'
        run: |
          uv run diff-cover coverage.xml \
            --compare-branch=origin/main \
            --fail-under=80 \
            --html-report diff-cover.html \
            --markdown-report diff-cover.md
          cat diff-cover.md >> $GITHUB_STEP_SUMMARY

      - name: Upload diff-cover HTML report
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: diff-cover-report
          path: diff-cover.html
          if-no-files-found: ignore
