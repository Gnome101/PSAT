name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: psat
          POSTGRES_PASSWORD: psat
          POSTGRES_DB: psat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: forge --version
      - name: Create test database
        run: PGPASSWORD=psat psql -h localhost -U psat -d psat -c "CREATE DATABASE psat_test OWNER psat;"
      - run: uv run pytest -k "not live" -q

  coverage:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: psat
          POSTGRES_PASSWORD: psat
          POSTGRES_DB: psat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://psat:psat@localhost:5432/psat_test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - uses: astral-sh/setup-uv@v5
      - name: Create test database
        run: PGPASSWORD=psat psql -h localhost -U psat -d psat -c "CREATE DATABASE psat_test OWNER psat;"

      - name: Baseline coverage (main)
        if: github.event_name == 'pull_request'
        run: |
          git checkout origin/main
          uv sync --dev
          uv run --with coverage coverage run -m pytest -k "not live" -q
          MAIN_COV=$(uv run --with coverage coverage report --format=total)
          echo "MAIN_COV=$MAIN_COV" >> $GITHUB_ENV
          echo "Main coverage: ${MAIN_COV}%"
          git checkout -

      - run: uv sync --dev
      - run: uv run --with coverage coverage run -m pytest -k "not live" -q

      - name: Coverage report
        run: |
          uv run --with coverage coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(uv run --with coverage coverage report --format=total)
          echo "**Total coverage: ${TOTAL}%** (minimum: 70%)" >> $GITHUB_STEP_SUMMARY
          echo "Total coverage: ${TOTAL}%"
          uv run --with coverage coverage report

      - name: Coverage regression check
        if: github.event_name == 'pull_request'
        run: |
          PR_COV=$(uv run --with coverage coverage report --format=total)
          echo "main: ${MAIN_COV}% → PR: ${PR_COV}%"
          echo "**Coverage: ${MAIN_COV}% (main) → ${PR_COV}% (PR)**" >> $GITHUB_STEP_SUMMARY
          if [ "$PR_COV" -lt "$MAIN_COV" ]; then
            echo "::error::Coverage regression: ${MAIN_COV}% → ${PR_COV}%"
            exit 1
          fi
