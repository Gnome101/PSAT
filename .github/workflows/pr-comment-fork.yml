name: PR comment commands

# Listens for /fork-prod in PR comments and dispatches fork-prod-to-pr.yml.
# Only repo collaborators with write+ permission can trigger; anyone else's
# comment is ignored. The workflow itself does no destructive work — all of
# that lives in fork-prod-to-pr.yml, dispatched here.
on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  # Required so we can dispatch fork-prod-to-pr.yml via the API.
  actions: write

jobs:
  fork-prod:
    # Only act on PR comments (issue_comment fires on issues too) that contain
    # the command. The script step below does the precise match before doing
    # anything destructive.
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/fork-prod')
    runs-on: ubuntu-latest
    steps:
      - name: Authorize commenter
        # Reject if the commenter doesn't have write+ on the repo. Without this,
        # any drive-by commenter could fire prod-touching actions.
        uses: actions/github-script@v7
        with:
          script: |
            const login = context.payload.comment.user.login;
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: login,
            });
            if (!['admin', 'maintain', 'write'].includes(perm.permission)) {
              core.setFailed(`@${login} lacks write permission (got: ${perm.permission})`);
            }

      - name: React to comment (rocket)
        # Visible feedback that the command was picked up.
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      - name: Dispatch fork workflow
        # GITHUB_TOKEN can dispatch workflow_dispatch — this is one of the
        # explicit exceptions to the "GITHUB_TOKEN events don't trigger
        # downstream workflows" rule.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run fork-prod-to-pr.yml \
            --ref main \
            -f pr_number="${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}"
