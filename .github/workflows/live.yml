name: Live tests

# Runs after PR preview finishes. PR preview is gated to same-repo PRs, so forks are filtered there.
on:
  workflow_run:
    workflows: ["PR preview"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

# Cancel in-flight live runs when a new preview lands — avoids two suites hitting the same staging DB.
concurrency:
  group: live-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  live:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # workflow_run.pull_requests is populated for same-repo PRs; fall back to head-SHA lookup.
          PR_NUM=$(echo '${{ toJSON(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          if [ -z "$PR_NUM" ]; then
            PR_NUM=$(gh pr list \
              -R "${{ github.repository }}" \
              --search "${{ github.event.workflow_run.head_sha }}" \
              --json number \
              --jq '.[0].number // empty')
          fi
          if [ -z "$PR_NUM" ]; then
            echo "::error::Could not resolve PR number for head SHA ${{ github.event.workflow_run.head_sha }}"
            exit 1
          fi
          echo "number=$PR_NUM" >> $GITHUB_OUTPUT

      - name: Resolve preview URL
        id: preview
        run: |
          echo "url=https://psat-pr-${{ steps.pr.outputs.number }}.fly.dev" >> $GITHUB_OUTPUT

      - name: Wait for preview /api/health
        run: |
          URL="${{ steps.preview.outputs.url }}/api/health"
          # 2 min ceiling: cold-start is 30-60s; past that the deploy is unhealthy.
          for i in $(seq 1 24); do
            if curl -fsS --max-time 5 "$URL" >/dev/null; then
              echo "preview healthy after attempt $i"
              exit 0
            fi
            echo "attempt $i: $URL not healthy yet, sleeping 5s"
            sleep 5
          done
          echo "::error::Preview never healthy at $URL"
          curl -v --max-time 5 "$URL" || true
          exit 1

      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev

      - name: Run live suite
        env:
          PSAT_LIVE_URL: ${{ steps.preview.outputs.url }}
          PSAT_ADMIN_KEY: ${{ secrets.PSAT_ADMIN_KEY }}
          # Pin to head SHA via raw.github — stable in git history regardless of renames.
          PSAT_LIVE_AUDIT_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.workflow_run.head_sha }}/tests/fixtures/audits/sample_audit.pdf
        run: uv run pytest -m live -q

      - name: Post sticky result (success)
        if: success()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          number: ${{ steps.pr.outputs.number }}
          header: psat-live-tests
          message: |
            ### :white_check_mark: Live integration tests passed

            - **Preview:** ${{ steps.preview.outputs.url }}
            - **Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Post sticky result (failure)
        if: failure()
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405
        with:
          number: ${{ steps.pr.outputs.number }}
          header: psat-live-tests
          message: |
            ### :x: Live integration tests failed

            - **Preview:** ${{ steps.preview.outputs.url }}
            - **Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
