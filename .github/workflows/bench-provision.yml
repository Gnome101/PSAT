name: Provision bench app

# One-shot provisioning of `psat-bench` — a dedicated Fly app for worker
# benchmarking. Bypasses the PR pipeline entirely so we can iterate on
# worker code without paying the ~40 min CI/live-tests cycle for every
# experiment. After provisioning, redeploys are done locally with
# `fly deploy -a psat-bench` (~3-5 min, no CI).
#
# Mirrors `pr.yml`'s deploy job but targets a stable app name and a
# stable Neon DB (`psat_bench`) + Tigris prefix (`bench/`). Uses the
# same `staging` GitHub environment for secrets.
#
# Trigger:  gh workflow run bench-provision.yml --ref <branch>
# Inputs:   ref to deploy (defaults to current branch's SHA)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to deploy to psat-bench"
        required: true
        default: "feat/accelerate-workers"

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      NEON_STAGING_HOST: ${{ secrets.NEON_STAGING_HOST }}
      NEON_STAGING_POOLER_HOST: ${{ secrets.NEON_STAGING_POOLER_HOST }}
      NEON_STAGING_USER: ${{ secrets.NEON_STAGING_USER }}
      NEON_STAGING_PASSWORD: ${{ secrets.NEON_STAGING_PASSWORD }}
      APP: psat-bench
      URL: https://psat-bench.fly.dev
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1

      - name: Create Fly app if missing
        run: flyctl apps create "$APP" --org personal || true

      - name: Create bench Neon database
        env:
          PGPASSWORD: ${{ secrets.NEON_STAGING_PASSWORD }}
        run: |
          # CREATE DATABASE must hit the direct compute endpoint, not pgbouncer.
          psql "sslmode=require host=$NEON_STAGING_HOST user=$NEON_STAGING_USER dbname=neondb" \
            -c "CREATE DATABASE psat_bench;" || true

      - name: Stage Fly secrets
        run: |
          # App connects via pooler to keep workers from blowing Neon's connection cap.
          DB_URL="postgresql://${NEON_STAGING_USER}:${NEON_STAGING_PASSWORD}@${NEON_STAGING_POOLER_HOST}/psat_bench?sslmode=require"
          flyctl secrets set --stage -a "$APP" \
            DATABASE_URL="$DB_URL" \
            PSAT_ADMIN_KEY="${{ secrets.PSAT_ADMIN_KEY }}" \
            PSAT_SITE_ORIGIN="$URL" \
            ETHERSCAN_API_KEY="${{ secrets.ETHERSCAN_API_KEY }}" \
            ETH_RPC="${{ secrets.ETH_RPC }}" \
            ENVIO_API_TOKEN="${{ secrets.ENVIO_API_TOKEN }}" \
            TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            OPEN_ROUTER_KEY="${{ secrets.OPEN_ROUTER_KEY }}" \
            GITHUB_TOKEN="${{ secrets.PROTOCOL_GITHUB_TOKEN }}" \
            ARTIFACT_STORAGE_ENDPOINT="${{ secrets.ARTIFACT_STORAGE_ENDPOINT }}" \
            ARTIFACT_STORAGE_BUCKET="${{ secrets.ARTIFACT_STORAGE_BUCKET }}" \
            ARTIFACT_STORAGE_ACCESS_KEY="${{ secrets.ARTIFACT_STORAGE_ACCESS_KEY }}" \
            ARTIFACT_STORAGE_SECRET_KEY="${{ secrets.ARTIFACT_STORAGE_SECRET_KEY }}" \
            ARTIFACT_STORAGE_PREFIX="bench/"

      - name: Generate bench fly config
        # min_machines_running = 0 so idle bench app suspends fully (no cost when nothing's running).
        # Web stays in [http_service] which auto-starts on request.
        run: sed 's/^  min_machines_running = 1$/  min_machines_running = 0/' fly.toml > fly-bench.toml

      - name: Deploy
        run: |
          flyctl deploy -a "$APP" \
            --config fly-bench.toml \
            --remote-only \
            --build-arg GIT_SHA="${{ github.sha }}"

      - name: Start workers (deploy leaves them stopped)
        # Same pattern pr.yml uses — flyctl deploy doesn't auto-start non-web groups,
        # and fly.toml's auto_start_machines only applies to [http_service] (web).
        run: |
          for proc in workers browser monitor; do
            flyctl machines list -a "$APP" --json \
              | jq -r ".[] | select(.config.metadata.fly_process_group == \"$proc\" and .state == \"stopped\") | .id" \
              | xargs -r -I{} flyctl machines start {} -a "$APP"
          done

      - name: Print app URL
        run: echo "::notice::psat-bench provisioned at $URL"
