app = "psat"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 300

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "uv run --no-sync alembic upgrade head"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[processes]
  app = "uv run --no-sync uvicorn api:app --host 0.0.0.0 --port 8000"
  workers = "./start_workers.sh"
  monitor = "./start_monitor.sh"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/api/health"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
  processes = ["app"]

[[vm]]
  size = "shared-cpu-4x"
  memory = "4gb"
  processes = ["workers"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["monitor"]
