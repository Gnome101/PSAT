app = "psat"
primary_region = "iad"
kill_signal = "SIGTERM"
# Slither/Playwright subprocesses don't honor SIGTERM, so a longer
# grace period just delays deploys. reclaim_stuck_jobs picks up
# interrupted work after SIGKILL.
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

# One-shot schema migration in a temporary machine. Runs once per
# deploy, before any long-lived machine boots — so the four process
# groups don't race on the enum AccessExclusiveLock during rolling
# deploys.
[deploy]
  release_command = "uv run --no-sync python -c 'from db.models import create_tables; create_tables()'"

# Each group scales independently. `fly scale count --process-group <name> N`.
# monitor runs chain-scan singletons — DO NOT scale above 1.
[processes]
  web     = "./start_web.sh"
  workers = "./start_workers.sh"
  browser = "./start_browser.sh"
  monitor = "./start_monitor.sh"

# HTTP routing + health checks only apply to the API group.
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep >=1 web machine so cold-starts don't slow the first request.
  min_machines_running = 1
  processes = ["web"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.http_checks]]
    method = "get"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"

# Per-group VM sizing. Tune with `fly scale vm <size> --process-group <name>`.

[[vm]]
  processes = ["web"]
  size = "shared-cpu-1x"
  memory = "512mb"

[[vm]]
  processes = ["workers"]
  size = "shared-cpu-2x"
  memory = "2gb"

# Playwright Chromium is RAM-heavy; give it its own headroom.
[[vm]]
  processes = ["browser"]
  size = "shared-cpu-2x"
  memory = "2gb"

[[vm]]
  processes = ["monitor"]
  size = "shared-cpu-1x"
  memory = "512mb"
