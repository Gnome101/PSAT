app = "psat"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = 300

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep >=1 machine alive so background workers survive idle periods.
  # Auto-stop is moot while min=1; it only kicks in if we scale out later.
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.http_checks]]
    method = "get"
    path = "/api/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
