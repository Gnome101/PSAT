services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: psat
      POSTGRES_PASSWORD: psat
      POSTGRES_DB: psat
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psat"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: psat-minio
      MINIO_ROOT_PASSWORD: psat-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 psat-minio psat-minio-secret &&
        mc mb --ignore-existing local/psat-artifacts &&
        mc mb --ignore-existing local/psat-artifacts-test
      "
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: psat-api:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://psat:psat@postgres:5432/psat
      ARTIFACT_STORAGE_ENDPOINT: http://minio:9000
      ARTIFACT_STORAGE_BUCKET: psat-artifacts
      ARTIFACT_STORAGE_ACCESS_KEY: psat-minio
      ARTIFACT_STORAGE_SECRET_KEY: psat-minio-secret
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  workers:
    build:
      context: .
      dockerfile: Dockerfile
    image: psat-api:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://psat:psat@postgres:5432/psat
      ARTIFACT_STORAGE_ENDPOINT: http://minio:9000
      ARTIFACT_STORAGE_BUCKET: psat-artifacts
      ARTIFACT_STORAGE_ACCESS_KEY: psat-minio
      ARTIFACT_STORAGE_SECRET_KEY: psat-minio-secret
    command: ["bash", "start_workers.sh"]
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  protocol-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    image: psat-api:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://psat:psat@postgres:5432/psat
    command: ["uv", "run", "--no-sync", "python", "-m", "workers.protocol_monitor"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  protocol-poller:
    build:
      context: .
      dockerfile: Dockerfile
    image: psat-api:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://psat:psat@postgres:5432/psat
    command: ["uv", "run", "--no-sync", "python", "-m", "workers.protocol_monitor", "--poll"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tvl-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    image: psat-api:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://psat:psat@postgres:5432/psat
    command: ["uv", "run", "--no-sync", "python", "-m", "workers.protocol_monitor", "--tvl"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dapp-crawler:
    build:
      context: .
      dockerfile: docker/dapp-crawler.Dockerfile
    image: psat-dapp-crawler:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://psat:psat@postgres:5432/psat
      ARTIFACT_STORAGE_ENDPOINT: http://minio:9000
      ARTIFACT_STORAGE_BUCKET: psat-artifacts
      ARTIFACT_STORAGE_ACCESS_KEY: psat-minio
      ARTIFACT_STORAGE_SECRET_KEY: psat-minio-secret
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  site:
    build:
      context: .
      dockerfile: docker/site.Dockerfile
    image: psat-site:latest
    environment:
      VITE_DEV_HOST: 0.0.0.0
      VITE_DEV_PORT: 5173
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
